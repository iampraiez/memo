name: Production Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Code Quality (Lint)
        run: pnpm lint

      - name: Consistency (Format)
        run: pnpm format:check

      - name: Type Integrity (Tsc)
        run: pnpm tsc --noEmit

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Dependency Audit
        run: pnpm audit --audit-level=high

  build:
    name: Production Build
    needs: [validate, security]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Application
        run: pnpm build
        env:
          # Production environment variables (Mocked for CI build phase)
          NODE_ENV: production
          DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/ci_db
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci_secret_placeholder_32_chars_long_minimum' }}
          AUTH_URL: https://memo-lane.vercel.app
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID || 'ci_google_id' }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET || 'ci_google_secret' }}
          EMAIL_USER: ci@example.com
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY || 'ci_vapid_private_key' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'ci_gemini_placeholder' }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME || 'ci_cloud_name' }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY || 'ci_api_key' }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET || 'ci_api_secret' }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY || 'ci_vapid_public_key' }}
          NEXT_PUBLIC_URL: https://memo-lane.vercel.app

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: .next
          retention-days: 5
